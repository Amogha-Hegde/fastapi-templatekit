# pytest.ini
[pytest]
# ---------------------------------------------------------------------
# TEST DISCOVERY
# ---------------------------------------------------------------------
testpaths =
    fastapi_template/tests

python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

pythonpath =
    .

# ---------------------------------------------------------------------
# TEST OPTIONS
# ---------------------------------------------------------------------
addopts =
    -v
    --color=yes
    --capture=no
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=fastapi_template
    --cov-config=.coveragerc
    --cov-report=term-missing:skip-covered
    --cov-report=xml
    --cov-fail-under=90

# ---------------------------------------------------------------------
# WARNINGS HANDLING
# ---------------------------------------------------------------------
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning

# ---------------------------------------------------------------------
# TEST MARKERS
# ---------------------------------------------------------------------
markers =
    unit: marks unit tests (fast)
    integration: marks integration tests (slower, may hit DB or network)
    functional: marks end-to-end or workflow tests
    slow: marks tests that take longer to run
    smoke: marks basic smoke sanity tests